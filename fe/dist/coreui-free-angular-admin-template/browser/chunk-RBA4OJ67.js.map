@if (searchReady()) {
  <app-datagrid
    [columns]="columns"
    [rows]="tessere()"
    [searchConfig]="searchConfig"
    [toolbarConfig]="toolbarConfig"
    [paginationConfig]="paginationConfig"
    [sortingConfig]="sortingConfig"
    [loadingConfig]="loadingConfig"
    [persistConfig]="persistConfig"
    [loading]="datagridLoading()"
    [emptyStateConfig]="emptyStateConfig"
    (dataRequest)="loadData($event)"
    [contextMenuConfig]="contextMenuConfig"
    [selectionConfig]="selectionConfig"
    (selectionChange)="onSelectionChange($event)"
    [selectionSummaryConfig]="selectionSummaryConfig"
  />
}

<app-tessera-modal-cmp
  [(visible)]="isModalOpen"
  [mode]="mode"
  [tesseraSelected]="tesseraSelected()"
  [sediList]="sedi()"
  (saved)="refresh()"
></app-tessera-modal-cmp>

<app-tessera-aggiungi
  [(visible)]="isModalAggiungiOpen"
  (saved)="refresh()"
></app-tessera-aggiungi>

<app-tessera-history
  [(visible)]="isModalHistoryOpen"
  [tesseraSelectedHistory]="tesseraHistory()"
></app-tessera-history>

<ng-template #actionTemplate let-row let-selectedRows="selectedRows">
  <c-dropdown>
    <button
      cButton
      color="secondary"
      variant="ghost"
      shape="rounded-pill"
      cDropdownToggle
      direction="dropend"
    >
      <svg [cIcon]="icons.cilOptions" title="Opzioni"></svg>
    </button>

    <ul cDropdownMenu>
      @for (action of actionsArray; track action.name) {
        @if (action.visibility(row)) {
          <li cDropdownItem (click)="action.do(row)">
            <span [class]="action.color">
              <svg [cIcon]="action.icon" [title]="action.title"></svg>
              {{ action.title }}
            </span>
          </li>
        }
      }
    </ul>
  </c-dropdown>
</ng-template>

<ng-template #contextActionTemplate let-row let-selectedRows="selectedRows">
  <ul cListGroup class="context-menu-list">
    @for (action of actionsArray; track action.name) {
      @if (action.visibility(row)) {
        <li
          cListGroupItem
          action
          (click)="action.do(row)"
          class="context-menu-item"
        >
          <span [class]="action.color">
            <svg [cIcon]="action.icon" [title]="action.title"></svg>
            {{ action.title }}
          </span>
        </li>
      }
    }
  </ul>
</ng-template>
