<br/>
    <c-card>
      <c-card-body>
        <form
          cForm
          [formGroup]="form"
          (ngSubmit)="creaFileRisposta()"
          [gutter]="3"
          cRow
        >
          <c-col xs="6" lg="6">
            <label cLabel class="visually-hidden" for="oggetto">
              Oggetto
            </label>
            <input
              cFormControl
              id="oggetto"
              formControlName="oggetto"
              placeholder="Oggetto"
              type="text"
            />
          </c-col>
          <c-col xs="6" lg="6">
            <label cLabel class="visually-hidden" for="onumProtocolloggetto">
              # Protocollo
            </label>
            <input
              cFormControl
              id="numProtocollo"
              formControlName="numProtocollo"
              placeholder="# Protocollo"
              type="text"
            />
          </c-col>
          <c-col xs="4" lg="4">
            <label cLabel class="visually-hidden" for="dataProtocollo">
              Data Protocollo
            </label>
            <app-datepicker
              cFormControl
              id="dataProtocollo"
              formControlName="dataProtocollo"
              placeholder="Data Protocollo"
              min="1900-01-01"
              max="9999-12-31"
              [showTodayButton]="true"
              todayButtonLabel="Oggi"
              [showTime]="false"
            />
          </c-col>
          <c-col xs="8" lg="8">
            <label cLabel class="visually-hidden" for="sede"> Sede </label>
            <app-autocomplete-select
              formControlName="sede"
              [options]="sediOptions()"
              placeholder="Select sede"
            />
          </c-col>
          <c-col xs="4" lg="4">
            <label cLabel class="visually-hidden" for="tipoTemplate">
              Tipo Template
            </label>
            <select
              cSelect
              cFormControl
              id="tipoTemplate"
              placeholder="Tipo Template"
              formControlName="tipoTemplate"
            >
              <option value="singolo">Singolo</option>
              <option value="multiplo">Multiplo</option>
            </select>
          </c-col>
          @if (form.controls.tipoTemplate.value === "multiplo") {
            <c-col xs="4" lg="4">
              <label cLabel class="visually-hidden" for="qntBadge">
                Quantità Badge
              </label>
              <input
                cFormControl
                id="qntBadge"
                formControlName="qntBadge"
                placeholder="Quantità Badge"
                type="text"
              />
            </c-col>
          }
        </form>
      </c-card-body>
      <c-card-footer>
        <div class="d-flex justify-content-end mt-3 flex-wrap">
          <button cButton color="success" type="submit" [disabled]="false">
            Crea Risposta
          </button>
        </div>
      </c-card-footer>
    </c-card>
