<div class="cui-datepicker">
  <div
    class="cui-input-wrapper"
    [class.invalid]="invalid"
    [class.disabled]="disabled"
  >
    <input
      #dateInput
      [type]="showTime ? 'datetime-local' : 'date'"
      class="native-date-input"
      [value]="value || ''"
      [min]="min"
      [max]="max"
      [disabled]="disabled"
      (change)="onValueChange($event)"
    />

    <input
      type="text"
      class="cui-input custom-datepicker-input"
      [value]="displayValue"
      [placeholder]="placeholder || computedPlaceholder"
      [disabled]="disabled"
      readonly
      (click)="openPicker(dateInput)"
    />

    <div class="input-actions">
      <button
        type="button"
        class="action-icon"
        [disabled]="disabled"
        title="Select date"
        (click)="openPicker(dateInput)"
      >
        <svg [cIcon]="icons.cilCalendar"></svg>
      </button>

      @if (showTodayButton) {
        <button
          type="button"
          class="action-icon"
          [disabled]="disabled"
          [title]="todayButtonLabel"
          (click)="setToday(); $event.stopPropagation()"
        >
          <svg [cIcon]="icons.cilClock"></svg>
        </button>
      }

      @if (showSpecificDateButton) {
        <button
          type="button"
          class="action-icon"
          [disabled]="disabled"
          [title]="specificDateButtonLabel"
          (click)="setSpecificDate(); $event.stopPropagation()"
        >
          <svg [cIcon]="icons.cilInfinity"></svg>
        </button>
      }

    </div>
  </div>
</div>
