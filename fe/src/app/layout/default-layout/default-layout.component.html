<!--sidebar-->
<c-sidebar
  #sidebar1="cSidebar"
  class="d-print-none sidebar sidebar-fixed border-end"
  id="sidebar1"
  [narrow]="sidebarNarrow()"
  visible
>
  <c-sidebar-header class="border-bottom">
    <c-sidebar-brand [routerLink]="['/']">
      <img
        [src]="logoSrc()"
        alt="Logo"
        [width]="logoWidth()"
        class="sidebar-logo"
      />
      <!-- <svg [class]="{icon: false}" cIcon class="sidebar-brand-full" height="32" name="logo" title="CoreUI Logo"></svg> -->
      <!-- <svg cIcon class="sidebar-brand-narrow" height="32" name="signet" title="CoreUI Logo"></svg> -->
    </c-sidebar-brand>
  </c-sidebar-header>

  <ng-scrollbar pointerEventsMethod="scrollbar" visibility="hover">
    <c-sidebar-nav [navItems]="visibleNavItems()" dropdownMode="path" compact />
  </ng-scrollbar>

  <c-sidebar-footer class="border-top d-none d-lg-flex sidebar-footer-custom">
    @if (!sidebarNarrow()) {
      <div class="sidebar-authors">
        <div class="sidebar-authors-title">Autori</div>

        <a
          href="https://rubrica.dipvvf.it/rubrica/rubrica"
          target="_blank"
          class="sidebar-authors-link"
        >
          SN, LG, MT, FSC
        </a>
      </div>
    }

    <button
      cSidebarToggler
      aria-label="Toggle sidebar fold"
      class="sidebar-toggle-btn"
      (click)="toggleSidebarNarrow()"
    ></button>
  </c-sidebar-footer>
</c-sidebar>

<!--main-->
<div class="wrapper d-flex flex-column min-vh-100">
  <!--app-header-->
  <app-default-header
    [cShadowOnScroll]="'sm'"
    class="mb-4 d-print-none header header-sticky p-0 shadow-sm"
    position="sticky"
    [sidebarId]="'sidebar1'"
  />
  <!--app-body-->
  <div class="body flex-grow-1">
    <c-container breakpoint="lg" class="h-auto px-4">
      <router-outlet />
    </c-container>
  </div>
  <!--app footer-->
  <app-default-footer />
</div>
