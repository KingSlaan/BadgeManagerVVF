<c-container>
  <h3>Statistiche Badge</h3>
  <c-row>
    <c-col lg="3" xs="6">
      <c-widget-stat-c
        [title]="'Badge Totali'"
        color="primary"
        inverse
        value="972"
      >
        <ng-template cTemplateId="widgetIconTemplate">
          <svg cIcon height="25" name="cilUser"></svg>
        </ng-template>
        <ng-template cTemplateId="widgetProgressTemplate">
          <c-progress class="mt-3 mb-0" thin white [value]="100" />
        </ng-template>
      </c-widget-stat-c>
    </c-col>

    <c-col lg="3" xs="6">
      <c-widget-stat-c
        [title]="'Badge Assegnati'"
        color="success"
        inverse
        value="972"
      >
        <ng-template cTemplateId="widgetIconTemplate">
          <svg cIcon height="25" name="cilUserFollow"></svg>
        </ng-template>
        <ng-template cTemplateId="widgetProgressTemplate">
          <c-progress class="mt-3 mb-0" thin white [value]="60" />
        </ng-template>
      </c-widget-stat-c>
    </c-col>

    <c-col lg="3" xs="6">
      <c-widget-stat-c
        [title]="'Badge non assegnati'"
        color="warning"
        inverse
        value="972"
      >
        <ng-template cTemplateId="widgetIconTemplate">
          <svg cIcon height="25" name="cilUserUnfollow"></svg>
        </ng-template>
        <ng-template cTemplateId="widgetProgressTemplate">
          <c-progress class="mt-3 mb-0" thin white [value]="25" />
        </ng-template>
      </c-widget-stat-c>
    </c-col>

    <c-col lg="3" xs="6">
      <c-widget-stat-c
        [title]="'Badge Scaduti'"
        color="danger"
        inverse
        value="972"
      >
        <ng-template cTemplateId="widgetIconTemplate">
          <svg cIcon height="25" name="cilTrash"></svg>
        </ng-template>
        <ng-template cTemplateId="widgetProgressTemplate">
          <c-progress class="mt-3 mb-0" thin white [value]="15" />
        </ng-template>
      </c-widget-stat-c>
    </c-col>
  </c-row>

  <hr />

  <c-row>
    <c-col xs="12" lg="12">
      <c-card class="mb-4">
        <c-card-header> Badge per Sedi </c-card-header>
        <c-card-body>
          <c-chart type="bar" [data]="chartBarData" [options]="options" />
        </c-card-body>
      </c-card>
    </c-col>
  </c-row>

</c-container>
