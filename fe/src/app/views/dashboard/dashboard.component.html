<h3>Statistiche Badge</h3>
<c-row>
  <c-col lg="3" xs="6">
    <c-widget-stat-c
      [title]="'Totali'"
      color="primary"
      inverse
      [value]="this.statistiche().generale.totali"
      (click)="goTo('/liste/tessere')"
      class="shadow-card"
    >
      <ng-template cTemplateId="widgetIconTemplate">
        <svg cIcon height="25" name="cilUser"></svg>
      </ng-template>
      <ng-template cTemplateId="widgetProgressTemplate">
        <c-progress class="mt-3 mb-0" thin white [value]="100" />
      </ng-template>
    </c-widget-stat-c>
  </c-col>

  <c-col lg="3" xs="6">
    <c-widget-stat-c
      [title]="'Utilizzabii Assegnati'"
      color="success"
      inverse
      [value]="this.statistiche().generale.assegnati"
    >
      <ng-template cTemplateId="widgetIconTemplate">
        <svg cIcon height="25" name="cilUserFollow"></svg>
      </ng-template>
      <ng-template cTemplateId="widgetProgressTemplate">
        <c-progress
          class="mt-3 mb-0"
          thin
          white
          [value]="
            calPerc(
              this.statistiche().generale.assegnati,
              this.statistiche().generale.totali
            )
          "
        />
      </ng-template>
    </c-widget-stat-c>
  </c-col>

  <c-col lg="3" xs="6">
    <c-widget-stat-c
      [title]="'Utilizzabii Non Assegnati'"
      color="warning"
      inverse
      [value]="this.statistiche().generale.nonAssegnati"
      (click)="goTo('/liste/tessere', { soloNonAssegnate: true })"
      class="shadow-card"
    >
      <ng-template cTemplateId="widgetIconTemplate">
        <svg cIcon height="25" name="cilUserUnfollow"></svg>
      </ng-template>
      <ng-template cTemplateId="widgetProgressTemplate">
        <c-progress
          class="mt-3 mb-0"
          thin
          white
          [value]="
            calPerc(
              this.statistiche().generale.nonAssegnati,
              this.statistiche().generale.totali
            )
          "
        />
      </ng-template>
    </c-widget-stat-c>
  </c-col>

  <c-col lg="3" xs="6">
    <c-widget-stat-c
      [title]="'Inutilizzabili'"
      color="danger"
      inverse
      [value]="this.statistiche().generale.inutilizzabili"
    >
      <ng-template cTemplateId="widgetIconTemplate">
        <svg cIcon height="25" name="cilTrash"></svg>
      </ng-template>
      <ng-template cTemplateId="widgetProgressTemplate">
        <c-progress
          class="mt-3 mb-0"
          thin
          white
          [value]="
            calPerc(
              this.statistiche().generale.inutilizzabili,
              this.statistiche().generale.totali
            )
          "
        />
      </ng-template>
    </c-widget-stat-c>
  </c-col>
</c-row>

<hr />

<c-row>
  <c-col xs="12" lg="12">
    <c-card class="mb-4">
      <c-card-header> Per Sedi </c-card-header>
      <c-card-body>
        <c-chart
          type="bar"
          [data]="chartBarTessereData()"
          [options]="options"
        />
      </c-card-body>
    </c-card>
  </c-col>
</c-row>
