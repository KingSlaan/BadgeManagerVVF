<!-- <c-container> -->
<h3>Statistiche Tessere</h3>
<c-row>
   <c-col lg="1" xs="1">

   </c-col>
  <c-col lg="2" xs="6">
    <c-widget-stat-c
      [title]="'Totali'"
      color="primary"
      inverse
      [value]="this.statistiche().generale.totali"
      (click)="goTo('/liste/tessere')"
      class="shadow-card"
    >
      <ng-template cTemplateId="widgetIconTemplate">
        <svg cIcon height="25" name="cilUser"></svg>
      </ng-template>
      <ng-template cTemplateId="widgetProgressTemplate">
        <c-progress class="mt-3 mb-0" thin white [value]="100" />
      </ng-template>
    </c-widget-stat-c>
  </c-col>

  <c-col lg="2" xs="6">
    <c-widget-stat-c
      [title]="tessereStatusMsg.LIBERA_DESC_PLU"
      color="success"
      inverse
      (click)="goTo('/liste/tessere', { stato: tessereStatusMsg.LIBERA })"
      [value]="this.statistiche().generale.libere"
      class="shadow-card"
    >
      <ng-template cTemplateId="widgetIconTemplate">
        <svg cIcon height="25" name="cilUserFollow"></svg>
      </ng-template>
      <ng-template cTemplateId="widgetProgressTemplate">
        <c-progress
          class="mt-3 mb-0"
          thin
          white
          [value]="
            calPerc(
              this.statistiche().generale.libere,
              this.statistiche().generale.totali
            )
          "
        />
      </ng-template>
    </c-widget-stat-c>
  </c-col>

  <c-col lg="2" xs="6">
    <c-widget-stat-c
      [title]="tessereStatusMsg.OCCUPATA_DESC_PLU"
      color="warning"
      inverse
      [value]="this.statistiche().generale.occupate"
      (click)="goTo('/liste/tessere', { stato: tessereStatusMsg.OCCUPATA })"
      class="shadow-card"
    >
      <ng-template cTemplateId="widgetIconTemplate">
        <svg cIcon height="25" name="cilUserUnfollow"></svg>
      </ng-template>
      <ng-template cTemplateId="widgetProgressTemplate">
        <c-progress
          class="mt-3 mb-0"
          thin
          white
          [value]="
            calPerc(
              this.statistiche().generale.occupate,
              this.statistiche().generale.totali
            )
          "
        />
      </ng-template>
    </c-widget-stat-c>
  </c-col>

  <c-col lg="2" xs="6">
    <c-widget-stat-c
      [title]="tessereStatusMsg.INDISPONIBILE_DESC_PLU"
      color="danger"
      inverse
      (click)="goTo('/liste/tessere', { stato: tessereStatusMsg.INDISPONIBILE })"
      [value]="this.statistiche().generale.indisponibili"
      class="shadow-card"
    >
      <ng-template cTemplateId="widgetIconTemplate">
        <svg cIcon height="25" name="cilTrash"></svg>
      </ng-template>
      <ng-template cTemplateId="widgetProgressTemplate">
        <c-progress
          class="mt-3 mb-0"
          thin
          white
          [value]="
            calPerc(
              this.statistiche().generale.indisponibili,
              this.statistiche().generale.totali
            )
          "
        />
      </ng-template>
    </c-widget-stat-c>
  </c-col>

  <c-col lg="2" xs="6">
    <c-widget-stat-c
      [title]="tessereStatusMsg.ND_DESC"
      color="secondary"
      inverse
      (click)="goTo('/liste/tessere', { stato: tessereStatusMsg.ND })"
      [value]="this.statistiche().generale.nd || 0"
      class="shadow-card"
    >
      <ng-template cTemplateId="widgetIconTemplate">
        <svg cIcon height="25" name="cilTrash"></svg>
      </ng-template>
      <ng-template cTemplateId="widgetProgressTemplate">
        <c-progress
          class="mt-3 mb-0"
          thin
          white
          [value]="
            calPerc(
              this.statistiche().generale.nd,
              this.statistiche().generale.totali
            )
          "
        />
      </ng-template>
    </c-widget-stat-c>
  </c-col>
</c-row>

<hr />

<c-row>
  <c-col xs="12" lg="12">
    <c-card class="mb-4">
      <c-card-header> Per Sedi </c-card-header>
      <c-card-body>
        <c-chart
          type="bar"
          [data]="chartBarTessereData()"
          [options]="options"
        />
      </c-card-body>
    </c-card>
  </c-col>
</c-row>

<!-- </c-container> -->
