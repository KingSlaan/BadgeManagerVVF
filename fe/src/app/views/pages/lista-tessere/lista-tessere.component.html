<app-datagrid
  [columns]="columns"
  [rows]="tessere()"
  [searchConfig]="searchConfig"
  [toolbarConfig]="toolbarConfig"
  [paginationConfig]="paginationConfig"
  [sortingConfig]="sortingConfig"
  [loadingConfig]="loadingConfig"
  [persistConfig]="persistConfig"
  [loading]="datagridLoading()"
  [emptyStateConfig]="emptyStateConfig"
  (dataRequest)="loadData($event)"
/>

<app-tessera-modal-cmp
  [(visible)]="isModalOpen"
  [mode]="mode"
  [tesseraSelected]="tesseraSelected()"
  (saved)="loadData(this.initialRequest)"
></app-tessera-modal-cmp>

<app-tessera-aggiungi [(visible)]="isModalAggiungiOpen"></app-tessera-aggiungi>

<app-tessera-history
  [(visible)]="isModalHistoryOpen"
  [tesseraSelected]="tesseraSelected()"
></app-tessera-history>

<ng-template #actionTemplate let-row>
  @if (!row.codiceFiscale) {
    <button
      cButton
      color="info"
      variant="ghost"
      shape="rounded-pill"
      (click)="openModal('assign', row.idTessera)"
    >
      <svg [cIcon]="icons.cilActionUndo" title="Assegna Dipendente"></svg>
    </button>
  }

  <!-- <button
    cButton
    color="primary"
    variant="ghost"
    shape="rounded-pill"
    (click)="openModal('edit', row.idTessera)"
  >
    <svg [cIcon]="icons.cilPencil" title="Modifica"></svg>
  </button> -->
  <button
    cButton
    color="danger"
    variant="ghost"
    shape="rounded-pill"
    (click)="openModal('disabled', row.idTessera)"
  >
    <svg [cIcon]="icons.cilBan" title="Disabilita"></svg>
  </button>
  @if (row.codiceFiscale) {
    <button
      cButton
      color="danger"
      variant="ghost"
      shape="rounded-pill"
      (click)="openModal('remove', row.idTessera)"
    >
      <svg [cIcon]="icons.cilDelete" title="Disuso"></svg>
    </button>
  }
  <button
    cButton
    color="secondary"
    variant="ghost"
    shape="rounded-pill"
    (click)="openHistoryModal(row.idTessera)"
  >
    <svg [cIcon]="icons.cilHistory" title="Cronologia"></svg>
  </button>
</ng-template>
