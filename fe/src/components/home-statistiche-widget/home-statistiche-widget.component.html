<c-row class="stats-widget-row">
  <c-col class="d-flex" xl="3" lg="3" md="6" xs="12">
    <c-widget-stat-c
      title="Totali"
      color="primary"
      inverse
      [value]="statistiche().generale.totali"
      (click)="goTo('/liste/tessere')"
      class="shadow-card"
    >
      <ng-template cTemplateId="widgetIconTemplate">
        <svg cIcon height="25" name="cilGroup"></svg>
      </ng-template>

      <ng-template cTemplateId="widgetProgressTemplate">
        <c-progress class="mt-3 mb-0" thin white [value]="100" />
      </ng-template>
    </c-widget-stat-c>
  </c-col>

  <c-col class="d-flex" xl="3" lg="3" md="6" xs="12">
    <c-widget-stat-c
      [title]="tessereStatusMsg.LIBERA_DESC_PLU"
      color="success"
      inverse
      [value]="statistiche().generale.libere"
      (click)="goTo('/liste/tessere', { stato: tessereStatusMsg.LIBERA })"
      class="shadow-card"
    >
      <ng-template cTemplateId="widgetIconTemplate">
        <svg cIcon height="25" name="cilUserFollow"></svg>
      </ng-template>

      <ng-template cTemplateId="widgetProgressTemplate">
        <c-progress
          class="mt-3 mb-0"
          thin
          white
          [value]="calPerc(statistiche().generale.libere, statistiche().generale.totali)"
        />
      </ng-template>
    </c-widget-stat-c>
  </c-col>

  <c-col class="d-flex" xl="3" lg="3" md="6" xs="12">
    <c-widget-stat-c
      [title]="tessereStatusMsg.OCCUPATA_DESC_PLU"
      color="warning"
      inverse
      [value]="statistiche().generale.occupate"
      (click)="goTo('/liste/tessere', { stato: tessereStatusMsg.OCCUPATA })"
      class="shadow-card"
    >
      <ng-template cTemplateId="widgetIconTemplate">
        <svg cIcon height="25" name="cilUser"></svg>
      </ng-template>

      <ng-template cTemplateId="widgetProgressTemplate">
        <c-progress
          class="mt-3 mb-0"
          thin
          white
          [value]="calPerc(statistiche().generale.occupate, statistiche().generale.totali)"
        />
      </ng-template>
    </c-widget-stat-c>
  </c-col>

  <c-col class="d-flex" xl="3" lg="3" md="6" xs="12">
    <c-widget-stat-c
      [title]="tessereStatusMsg.INDISPONIBILE_DESC_PLU"
      color="danger"
      inverse
      [value]="statistiche().generale.indisponibili"
      (click)="goTo('/liste/tessere', { stato: tessereStatusMsg.INDISPONIBILE })"
      class="shadow-card"
    >
      <ng-template cTemplateId="widgetIconTemplate">
        <svg cIcon height="25" name="cilTrash"></svg>
      </ng-template>

      <ng-template cTemplateId="widgetProgressTemplate">
        <c-progress
          class="mt-3 mb-0"
          thin
          white
          [value]="calPerc(statistiche().generale.indisponibili, statistiche().generale.totali)"
        />
      </ng-template>
    </c-widget-stat-c>
  </c-col>
</c-row>
