<div class="cui-datepicker">
  <div
    class="cui-input-wrapper"
    [class.invalid]="invalid"
    [class.disabled]="disabled"
  >
    <input
      #dateInput
      type="datetime-local"
      class="native-date-input"
      [value]="value || ''"
      [min]="min"
      [max]="max"
      [disabled]="disabled"
      (change)="onValueChange($event)"
    />

    <input
      type="text"
      class="cui-input"
      [value]="displayValue"
      [placeholder]="placeholder"
      [disabled]="disabled"
      readonly
      (click)="openPicker(dateInput)"
    />

    <span class="calendar-icon">
      <!-- <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="1.8"
      >
        <rect x="3" y="4" width="18" height="18" rx="3"></rect>
        <path d="M16 2v4"></path>
        <path d="M8 2v4"></path>
        <path d="M3 10h18"></path>
      </svg> -->
      <svg [cIcon]="icons.cilCalendar" title="Assegna Dipendente"></svg>
    </span>
  </div>
</div>
